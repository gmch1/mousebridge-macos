name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE_P12 != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_P8 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate release version
        id: version
        shell: zsh {0}
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          plist_version=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)
          if [[ ! "$tag_version" =~ '^[0-9]+\.[0-9]+\.[0-9]+$' ]]; then
            print -u2 "Release tag must use vMAJOR.MINOR.PATCH"
            exit 1
          fi
          if [[ "$tag_version" != "$plist_version" ]]; then
            print -u2 "Tag $GITHUB_REF_NAME does not match Info.plist version $plist_version"
            exit 1
          fi
          print "version=$tag_version" >> "$GITHUB_OUTPUT"

      - name: Prepare Apple signing identity
        id: signing
        env:
          APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ "$HAS_APPLE_SIGNING" != "true" ]]; then
            print 'signed=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          keychain_password="${KEYCHAIN_PASSWORD:-$(uuidgen)}"
          keychain="$RUNNER_TEMP/mousebridge-signing.keychain-db"
          print -rn -- "$APPLE_CERTIFICATE_P12" | /usr/bin/base64 -D > "$RUNNER_TEMP/certificate.p12"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$RUNNER_TEMP/certificate.p12" -k "$keychain" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain"
          security list-keychain -d user -s "$keychain" login.keychain-db

          identity=$(security find-identity -v -p codesigning "$keychain" | awk -F'"' '/Developer ID Application/ { print $2; exit }')
          if [[ -z "$identity" ]]; then
            print -u2 'The imported certificate does not contain a Developer ID Application identity'
            exit 1
          fi
          print "identity=$identity" >> "$GITHUB_OUTPUT"
          print 'signed=true' >> "$GITHUB_OUTPUT"

      - name: Test and build app
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          SIGN_IDENTITY: ${{ steps.signing.outputs.identity }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          if [[ "${{ steps.signing.outputs.signed }}" == "true" ]]; then
            VERSION="$RELEASE_VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" SIGN_IDENTITY="$SIGN_IDENTITY" zsh build-app.sh
          else
            VERSION="$RELEASE_VERSION" BUILD_NUMBER="$GITHUB_RUN_NUMBER" zsh build-app.sh
          fi

      - name: Notarize signed app
        if: steps.signing.outputs.signed == 'true'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          print -rn -- "$APPLE_API_KEY_P8" | /usr/bin/base64 -D > "$RUNNER_TEMP/AuthKey.p8"
          ditto -c -k --keepParent dist/MouseBridge.app "$RUNNER_TEMP/MouseBridge-notarize.zip"
          xcrun notarytool submit "$RUNNER_TEMP/MouseBridge-notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait
          xcrun stapler staple dist/MouseBridge.app
          xcrun stapler validate dist/MouseBridge.app
          spctl -a -vv --type execute dist/MouseBridge.app

      - name: Package release assets
        id: package
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          asset="MouseBridge-v${RELEASE_VERSION}-macOS.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/MouseBridge.app "dist/$asset"
          cd dist
          shasum -a 256 "$asset" > "$asset.sha256"
          print "asset=$asset" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: MouseBridge-v${{ steps.version.outputs.version }}-macOS
          path: |
            dist/${{ steps.package.outputs.asset }}
            dist/${{ steps.package.outputs.asset }}.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          ASSET: ${{ steps.package.outputs.asset }}
          SIGNED: ${{ steps.signing.outputs.signed }}
        shell: zsh {0}
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/release-notes.md"
          {
            print "MouseBridge v$RELEASE_VERSION"
            print
            print 'Native macOS button mapping, trackpad multi-finger shortcuts, mouse-only scroll control, and Logitech M750 hardware DPI configuration.'
            print
            if [[ "$SIGNED" == "true" ]]; then
              print 'This build is Developer ID signed and notarized by Apple.'
            else
              print '> **Development preview:** Apple signing secrets are not configured, so this build uses an ad-hoc signature and is published as a pre-release. macOS Gatekeeper may require manual approval.'
            fi
            print
            print 'Verify the download with the attached `.sha256` file.'
            print
            print 'License: GPL-3.0-or-later. Corresponding source is available from the source archives attached to this Release.'
            print
            print '### Changes'
            sed -n "/^## $RELEASE_VERSION /,/^## /p" CHANGELOG.md | sed '$d'
          } > "$notes"

          prerelease=()
          if [[ "$SIGNED" != "true" ]]; then
            prerelease=(--prerelease)
          fi
          gh release create "$GITHUB_REF_NAME" \
            "dist/$ASSET" \
            "dist/$ASSET.sha256" \
            --verify-tag \
            --title "MouseBridge v$RELEASE_VERSION" \
            --notes-file "$notes" \
            "${prerelease[@]}"
